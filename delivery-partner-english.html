<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blinkit Delivery Training Simulation</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --blinkit-yellow: #F5C700;
  --blinkit-dark: #0C1A0E;
  --blinkit-green: #2B8C0E;
  --blinkit-green-light: #3AAF15;
  --bg-main: #0A0F0B;
  --card-bg: #141E16;
  --card-border: #1E2E20;
  --text-primary: #E8F0E9;
  --text-secondary: #8CA68F;
  --text-muted: #566958;
  --correct: #2ECC71;
  --correct-bg: rgba(46, 204, 113, 0.08);
  --wrong: #E74C3C;
  --wrong-bg: rgba(231, 76, 60, 0.08);
  --warning: #F39C12;
  --phone-bg: #1A1A2E;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg-main);
  color: var(--text-primary);
  min-height: 100vh;
  overflow-x: hidden;
}

/* Grain overlay */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 9999;
}

.app-container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 20px;
}

/* ── HEADER ── */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 20px 0 30px;
  border-bottom: 1px solid var(--card-border);
  margin-bottom: 30px;
}

.logo-area {
  display: flex;
  align-items: center;
  gap: 14px;
}

.logo-icon {
  width: 48px;
  height: 48px;
  background: var(--blinkit-yellow);
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  font-weight: 800;
  color: var(--blinkit-dark);
  box-shadow: 0 4px 20px rgba(245, 199, 0, 0.3);
}

.logo-text h1 {
  font-size: 20px;
  font-weight: 800;
  color: var(--blinkit-yellow);
  letter-spacing: -0.5px;
}

.logo-text span {
  font-size: 12px;
  color: var(--text-muted);
  font-weight: 500;
  letter-spacing: 2px;
  text-transform: uppercase;
}

.progress-badge {
  display: flex;
  align-items: center;
  gap: 10px;
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-radius: 100px;
  padding: 8px 18px;
  font-family: 'Space Mono', monospace;
  font-size: 13px;
  color: var(--text-secondary);
}

.progress-badge .dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--blinkit-green);
  animation: pulse 2s ease infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(43, 140, 14, 0.5); }
  50% { opacity: 0.7; box-shadow: 0 0 0 6px rgba(43, 140, 14, 0); }
}

/* ── SCENARIO LAYOUT ── */
.scenario-layout {
  display: grid;
  grid-template-columns: 340px 1fr;
  gap: 30px;
  min-height: 600px;
}

/* ── PHONE MOCKUP ── */
.phone-wrapper {
  display: flex;
  justify-content: center;
  align-items: flex-start;
  position: sticky;
  top: 30px;
}

.phone {
  width: 300px;
  height: 580px;
  background: #0F0F1A;
  border-radius: 36px;
  border: 3px solid #2A2A3E;
  overflow: hidden;
  position: relative;
  box-shadow: 0 20px 80px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.05);
}

.phone-notch {
  width: 120px;
  height: 28px;
  background: #0F0F1A;
  border-radius: 0 0 16px 16px;
  margin: 0 auto;
  position: relative;
  z-index: 10;
}

.phone-screen {
  padding: 0 14px 14px;
  height: calc(100% - 28px);
  overflow-y: auto;
  display: flex;
  flex-direction: column;
}

.phone-screen::-webkit-scrollbar { width: 0; }

/* Phone status bar */
.phone-status {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 6px 4px 10px;
  font-size: 11px;
  color: #666;
  font-family: 'Space Mono', monospace;
}

/* Map visual */
.map-visual {
  width: 100%;
  height: 160px;
  border-radius: 14px;
  margin-bottom: 12px;
  position: relative;
  overflow: hidden;
  flex-shrink: 0;
}

.map-visual svg {
  width: 100%;
  height: 100%;
}

/* Order card in phone */
.order-card {
  background: #1A1A2E;
  border: 1px solid #2A2A3E;
  border-radius: 14px;
  padding: 14px;
  margin-bottom: 10px;
}

.order-card .label {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: #555;
  margin-bottom: 6px;
}

.order-card .value {
  font-size: 14px;
  color: #DDD;
  font-weight: 600;
}

.order-card .value.highlight {
  color: var(--blinkit-yellow);
}

.order-card .subtext {
  font-size: 11px;
  color: #666;
  margin-top: 3px;
}

/* Timer in phone */
.delivery-timer {
  background: linear-gradient(135deg, rgba(231, 76, 60, 0.15), rgba(243, 156, 18, 0.1));
  border: 1px solid rgba(231, 76, 60, 0.3);
  border-radius: 14px;
  padding: 12px 14px;
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 10px;
}

.delivery-timer .timer-icon {
  font-size: 20px;
}

.delivery-timer .timer-text {
  font-size: 12px;
  color: #E74C3C;
  font-weight: 600;
}

.delivery-timer .timer-text span {
  display: block;
  font-size: 10px;
  color: #888;
  font-weight: 400;
  margin-top: 2px;
}

.notification-popup {
  background: linear-gradient(135deg, #1E1E36, #1A1A2E);
  border: 1px solid var(--blinkit-yellow);
  border-radius: 14px;
  padding: 12px 14px;
  margin-bottom: 10px;
  animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
}

.notification-popup .notif-header {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 6px;
}

.notification-popup .notif-icon {
  width: 24px;
  height: 24px;
  background: var(--blinkit-yellow);
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
}

.notification-popup .notif-app {
  font-size: 11px;
  color: var(--blinkit-yellow);
  font-weight: 700;
  letter-spacing: 0.5px;
}

.notification-popup .notif-body {
  font-size: 12px;
  color: #CCC;
  line-height: 1.5;
}

@keyframes slideUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ── RIGHT PANEL ── */
.scenario-panel {
  display: flex;
  flex-direction: column;
}

.scenario-tag {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: rgba(245, 199, 0, 0.08);
  border: 1px solid rgba(245, 199, 0, 0.2);
  color: var(--blinkit-yellow);
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  padding: 6px 14px;
  border-radius: 100px;
  margin-bottom: 16px;
  width: fit-content;
}

.scenario-title {
  font-size: 28px;
  font-weight: 800;
  color: var(--text-primary);
  line-height: 1.2;
  margin-bottom: 10px;
  letter-spacing: -0.5px;
}

.scenario-narrative {
  font-size: 15px;
  color: var(--text-secondary);
  line-height: 1.7;
  margin-bottom: 28px;
  max-width: 560px;
}

.scenario-narrative strong {
  color: var(--blinkit-yellow);
  font-weight: 600;
}

/* Situation card */
.situation-box {
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-radius: 16px;
  padding: 20px;
  margin-bottom: 24px;
  position: relative;
  overflow: hidden;
}

.situation-box::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  width: 4px;
  height: 100%;
  background: var(--warning);
  border-radius: 4px 0 0 4px;
}

.situation-label {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: var(--warning);
  font-weight: 700;
  margin-bottom: 8px;
}

.situation-text {
  font-size: 15px;
  color: var(--text-primary);
  line-height: 1.6;
}

/* Options */
.options-label {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: var(--text-muted);
  font-weight: 700;
  margin-bottom: 14px;
}

.options-grid {
  display: flex;
  flex-direction: column;
  gap: 12px;
  margin-bottom: 20px;
}

.option-btn {
  background: var(--card-bg);
  border: 1.5px solid var(--card-border);
  border-radius: 14px;
  padding: 16px 20px;
  cursor: pointer;
  transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
  display: flex;
  align-items: flex-start;
  gap: 14px;
  text-align: left;
  color: var(--text-primary);
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  line-height: 1.5;
  position: relative;
  overflow: hidden;
}

.option-btn:hover:not(.disabled) {
  border-color: var(--blinkit-yellow);
  background: rgba(245, 199, 0, 0.04);
  transform: translateY(-2px);
  box-shadow: 0 8px 30px rgba(0,0,0,0.3);
}

.option-btn .option-key {
  width: 32px;
  height: 32px;
  min-width: 32px;
  border-radius: 8px;
  background: rgba(255,255,255,0.05);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Space Mono', monospace;
  font-size: 13px;
  font-weight: 700;
  color: var(--text-muted);
  transition: all 0.25s ease;
}

.option-btn:hover:not(.disabled) .option-key {
  background: var(--blinkit-yellow);
  color: var(--blinkit-dark);
}

.option-btn.selected-correct {
  border-color: var(--correct);
  background: var(--correct-bg);
}

.option-btn.selected-correct .option-key {
  background: var(--correct);
  color: #fff;
}

.option-btn.selected-wrong {
  border-color: var(--wrong);
  background: var(--wrong-bg);
  animation: shakeX 0.5s ease;
}

.option-btn.selected-wrong .option-key {
  background: var(--wrong);
  color: #fff;
}

.option-btn.reveal-correct {
  border-color: var(--correct);
  background: var(--correct-bg);
}

.option-btn.reveal-correct .option-key {
  background: var(--correct);
  color: #fff;
}

.option-btn.disabled {
  opacity: 0.4;
  cursor: not-allowed;
}

@keyframes shakeX {
  0%, 100% { transform: translateX(0); }
  20% { transform: translateX(-8px); }
  40% { transform: translateX(8px); }
  60% { transform: translateX(-4px); }
  80% { transform: translateX(4px); }
}

/* Feedback panel */
.feedback-panel {
  border-radius: 16px;
  padding: 20px;
  margin-bottom: 20px;
  animation: fadeIn 0.4s ease;
  display: none;
}

.feedback-panel.visible { display: block; }

.feedback-panel.correct {
  background: var(--correct-bg);
  border: 1px solid rgba(46, 204, 113, 0.3);
}

.feedback-panel.wrong {
  background: var(--wrong-bg);
  border: 1px solid rgba(231, 76, 60, 0.3);
}

.feedback-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 10px;
}

.feedback-icon {
  width: 36px;
  height: 36px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
}

.feedback-panel.correct .feedback-icon {
  background: rgba(46, 204, 113, 0.2);
}

.feedback-panel.wrong .feedback-icon {
  background: rgba(231, 76, 60, 0.2);
}

.feedback-title {
  font-size: 16px;
  font-weight: 700;
}

.feedback-panel.correct .feedback-title { color: var(--correct); }
.feedback-panel.wrong .feedback-title { color: var(--wrong); }

.feedback-body {
  font-size: 14px;
  color: var(--text-secondary);
  line-height: 1.7;
}

.feedback-body strong {
  color: var(--text-primary);
  font-weight: 600;
}

/* Coaching tip */
.coaching-tip {
  background: rgba(245, 199, 0, 0.06);
  border: 1px solid rgba(245, 199, 0, 0.15);
  border-radius: 12px;
  padding: 14px 16px;
  margin-top: 12px;
  display: flex;
  gap: 10px;
}

.coaching-tip .tip-icon {
  font-size: 18px;
  flex-shrink: 0;
}

.coaching-tip .tip-text {
  font-size: 13px;
  color: var(--blinkit-yellow);
  line-height: 1.6;
}

/* Next button */
.next-btn {
  background: var(--blinkit-yellow);
  color: var(--blinkit-dark);
  border: none;
  border-radius: 12px;
  padding: 14px 32px;
  font-family: 'DM Sans', sans-serif;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.25s ease;
  display: none;
  align-items: center;
  gap: 8px;
  width: fit-content;
}

.next-btn.visible { display: inline-flex; }

.next-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 30px rgba(245, 199, 0, 0.3);
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ── WELCOME SCREEN ── */
.welcome-screen {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 60px 20px;
  min-height: 500px;
}

.welcome-badge {
  background: var(--blinkit-yellow);
  color: var(--blinkit-dark);
  width: 80px;
  height: 80px;
  border-radius: 22px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 36px;
  font-weight: 900;
  margin-bottom: 24px;
  box-shadow: 0 12px 40px rgba(245, 199, 0, 0.3);
}

.welcome-screen h2 {
  font-size: 36px;
  font-weight: 800;
  letter-spacing: -1px;
  margin-bottom: 12px;
}

.welcome-screen p {
  color: var(--text-secondary);
  font-size: 16px;
  max-width: 500px;
  line-height: 1.7;
  margin-bottom: 36px;
}

.welcome-features {
  display: flex;
  gap: 20px;
  margin-bottom: 40px;
  flex-wrap: wrap;
  justify-content: center;
}

.welcome-feature {
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-radius: 14px;
  padding: 16px 20px;
  display: flex;
  align-items: center;
  gap: 12px;
  font-size: 14px;
  color: var(--text-secondary);
}

.welcome-feature .wf-icon {
  font-size: 22px;
}

.start-btn {
  background: var(--blinkit-yellow);
  color: var(--blinkit-dark);
  border: none;
  border-radius: 14px;
  padding: 16px 48px;
  font-family: 'DM Sans', sans-serif;
  font-size: 17px;
  font-weight: 800;
  cursor: pointer;
  transition: all 0.3s ease;
  letter-spacing: 0.5px;
}

.start-btn:hover {
  transform: translateY(-3px);
  box-shadow: 0 12px 40px rgba(245, 199, 0, 0.35);
}

/* ── RESULTS SCREEN ── */
.results-screen {
  display: none;
  flex-direction: column;
  align-items: center;
  text-align: center;
  padding: 50px 20px;
}

.results-screen.visible { display: flex; }

.score-ring {
  width: 160px;
  height: 160px;
  position: relative;
  margin-bottom: 24px;
}

.score-ring svg {
  transform: rotate(-90deg);
}

.score-ring .score-text {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

.score-ring .score-num {
  font-size: 42px;
  font-weight: 800;
  color: var(--blinkit-yellow);
}

.score-ring .score-label {
  font-size: 12px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 1px;
}

.results-title {
  font-size: 28px;
  font-weight: 800;
  margin-bottom: 10px;
}

.results-subtitle {
  color: var(--text-secondary);
  font-size: 15px;
  max-width: 420px;
  line-height: 1.7;
  margin-bottom: 30px;
}

.results-breakdown {
  display: flex;
  gap: 16px;
  margin-bottom: 36px;
  flex-wrap: wrap;
  justify-content: center;
}

.result-item {
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-radius: 14px;
  padding: 16px 24px;
  min-width: 140px;
}

.result-item .ri-num {
  font-size: 28px;
  font-weight: 800;
  margin-bottom: 4px;
}

.result-item .ri-label {
  font-size: 12px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 1px;
}

.result-item.correct-item .ri-num { color: var(--correct); }
.result-item.wrong-item .ri-num { color: var(--wrong); }

/* ── RESPONSIVE ── */
@media (max-width: 768px) {
  .scenario-layout {
    grid-template-columns: 1fr;
  }
  .phone-wrapper {
    position: relative;
    top: 0;
    margin-bottom: 10px;
  }
  .phone {
    width: 260px;
    height: 480px;
  }
  .scenario-title { font-size: 22px; }
  .header { flex-direction: column; gap: 14px; align-items: flex-start; }
}
</style>
</head>
<body>

<div class="app-container" id="app">
  <!-- Header -->
  <div class="header">
    <div class="logo-area">
      <div class="logo-icon">B</div>
      <div class="logo-text">
        <h1>blinkit</h1>
        <span>Delivery Training</span>
      </div>
    </div>
    <div class="progress-badge" id="progressBadge">
      <div class="dot"></div>
      <span id="progressText">Ready to start</span>
    </div>
  </div>

  <!-- Welcome -->
  <div id="welcomeScreen" class="welcome-screen">
    <div class="welcome-badge">⚡</div>
    <h2>Delivery Pro Training</h2>
    <p>Real situations. Smart decisions. Master the skills every top-rated Blinkit delivery partner needs — from traffic jams to tricky customers.</p>
    <div class="welcome-features">
      <div class="welcome-feature"><span class="wf-icon">🚦</span> Traffic Delays</div>
      <div class="welcome-feature"><span class="wf-icon">🗺️</span> Navigation Issues</div>
      <div class="welcome-feature"><span class="wf-icon">😤</span> Angry Customers</div>
    </div>
    <button class="start-btn" onclick="startSimulation()">Start Training →</button>
  </div>

  <!-- Simulation content -->
  <div id="simContent" style="display:none;"></div>

  <!-- Results -->
  <div id="resultsScreen" class="results-screen"></div>
</div>

<script>
const scenarios = [
  {
    id: 1,
    tag: "Scenario 1 · Traffic Delay",
    tagIcon: "🚦",
    title: "Stuck in Rush-Hour Traffic",
    narrative: `It's 7:15 PM on a weekday. You picked up an order from <strong>Blinkit Dark Store #47</strong> — a grocery order with milk, bread, and eggs. The promised delivery time was <strong>10 minutes</strong>, but you've been stuck at the MG Road signal for 6 minutes now. The app is showing the order as <strong>"Running Late."</strong>`,
    situation: "Your phone buzzes — the customer has sent a message: \"Where is my order? It's been 15 minutes already!\" You're still 2 km away and traffic isn't moving. What do you do?",
    mapType: "traffic",
    phoneNotification: {
      text: "Customer message: \"Where is my order? It's been 15 minutes already!\"",
    },
    orderInfo: {
      id: "#BLK-90421",
      items: "Milk, Bread, Eggs (3 items)",
      address: "B-204, Sunshine Apartments",
      eta: "Running Late",
      etaClass: "highlight",
    },
    timerText: "6 min past ETA",
    timerSub: "Customer is waiting",
    options: [
      {
        key: "A",
        text: "Ignore the message. Focus on driving and deliver when you can — replying wastes time.",
        correct: false,
        feedback: "Ignoring the customer makes them feel invisible and more frustrated. It can lead to cancellations or 1-star ratings.",
        coaching: "Even a 10-second reply builds trust. Silence from a delivery partner is the #1 reason customers feel anxious about their order."
      },
      {
        key: "B",
        text: "Send a quick polite message: \"Hi! Stuck in heavy traffic at MG Road. Will reach in ~8 minutes. Sorry for the delay 🙏\"",
        correct: true,
        feedback: "Proactive communication is the gold standard. You've acknowledged the delay, given a realistic ETA, and shown empathy — all in under 15 seconds.",
        coaching: "Blinkit Pro Tip: Customers who receive a proactive delay message are 3x less likely to cancel and rate an average of 4.2★ even on late orders."
      },
      {
        key: "C",
        text: "Call the customer and explain in detail about traffic conditions and that it's not your fault.",
        correct: false,
        feedback: "Calling while riding is unsafe and illegal. Long explanations sound defensive. The customer doesn't need a reason — they need reassurance.",
        coaching: "Keep it safe: never call while driving. A short text message is faster, safer, and less intrusive for the customer."
      },
      {
        key: "D",
        text: "Cancel the order from your end to avoid a bad rating.",

    mapType: "delivery",
    phoneNotification: {

    },

    },
    timerText: "12 min past ETA",

    options: [

let currentScenario = 0;
let score = 0;
let answers = [];

function startSimulation() {
  document.getElementById('welcomeScreen').style.display = 'none';
  document.getElementById('simContent').style.display = 'block';
  loadScenario(0);
}

function loadScenario(index) {
  currentScenario = index;
  const s = scenarios[index];
  document.getElementById('progressText').textContent = `Scenario ${index + 1} of ${scenarios.length}`;

  const html = `
    <div class="scenario-layout" style="animation: fadeIn 0.5s ease">
      <div class="phone-wrapper">
        <div class="phone">
          <div class="phone-notch"></div>
          <div class="phone-screen">
            <div class="phone-status">
              <span>7:15 PM</span>
              <span>📶 4G</span>
            </div>
            <div class="map-visual">${getMapSVG(s.mapType)}</div>
            <div class="order-card">
              <div class="label">Order</div>
              <div class="value">${s.orderInfo.id}</div>
              <div class="subtext">${s.orderInfo.items}</div>
            </div>
            <div class="order-card">
              <div class="label">Deliver To</div>
              <div class="value">${s.orderInfo.address}</div>
              <div class="subtext">ETA: <span class="${s.orderInfo.etaClass}">${s.orderInfo.eta}</span></div>
            </div>
            <div class="delivery-timer">
              <div class="timer-icon">⏱️</div>
              <div class="timer-text">${s.timerText}<span>${s.timerSub}</span></div>
            </div>
            <div class="notification-popup">
              <div class="notif-header">
                <div class="notif-icon">⚡</div>
                <div class="notif-app">BLINKIT</div>
              </div>
              <div class="notif-body">${s.phoneNotification.text}</div>
            </div>
          </div>
        </div>
      </div>

      <div class="scenario-panel">
        <div class="scenario-tag">${s.tagIcon} ${s.tag}</div>
        <h2 class="scenario-title">${s.title}</h2>
        <p class="scenario-narrative">${s.narrative}</p>

        <div class="situation-box">
          <div class="situation-label">⚠ The Situation</div>
          <div class="situation-text">${s.situation}</div>
        </div>

        <div class="options-label">What would you do?</div>
        <div class="options-grid" id="optionsGrid">
          ${s.options.map((o, i) => `
            <button class="option-btn" data-index="${i}" onclick="selectOption(${i})">
              <div class="option-key">${o.key}</div>
              <div>${o.text}</div>
            </button>
          `).join('')}
        </div>

        <div class="feedback-panel" id="feedbackPanel"></div>
        <button class="next-btn" id="nextBtn" onclick="nextScenario()">
          ${index < scenarios.length - 1 ? 'Next Scenario →' : 'See Results →'}
        </button>
      </div>
    </div>
  `;

  document.getElementById('simContent').innerHTML = html;
}

function selectOption(index) {
  const s = scenarios[currentScenario];
  const option = s.options[index];
  const buttons = document.querySelectorAll('.option-btn');
  const feedback = document.getElementById('feedbackPanel');
  const nextBtn = document.getElementById('nextBtn');

  // Disable all buttons
  buttons.forEach((btn, i) => {
    btn.classList.add('disabled');
    btn.onclick = null;
    if (i === index) {
      btn.classList.add(option.correct ? 'selected-correct' : 'selected-wrong');
    }
    if (!option.correct && s.options[i].correct) {
      setTimeout(() => btn.classList.add('reveal-correct'), 600);
    }
  });

  // Track answer
  if (option.correct) score++;
  answers.push({ scenario: currentScenario, correct: option.correct, selected: index });

  // Show feedback
  const correctOption = s.options.find(o => o.correct);
  feedback.className = `feedback-panel visible ${option.correct ? 'correct' : 'wrong'}`;
  feedback.innerHTML = `
    <div class="feedback-header">
      <div class="feedback-icon">${option.correct ? '✅' : '❌'}</div>
      <div class="feedback-title">${option.correct ? 'Excellent Choice!' : 'Not the Best Move'}</div>
    </div>
    <div class="feedback-body">
      ${option.feedback}
      ${!option.correct ? `<br><br><strong>Better approach (Option ${correctOption.key}):</strong> ${correctOption.feedback}` : ''}
      <div class="coaching-tip">
        <div class="tip-icon">💡</div>
        <div class="tip-text">${option.correct ? option.coaching : correctOption.coaching}</div>
      </div>
    </div>
  `;

  // Show next button
  nextBtn.classList.add('visible');

  // Scroll to feedback
  setTimeout(() => feedback.scrollIntoView({ behavior: 'smooth', block: 'center' }), 300);
}

function nextScenario() {
  if (currentScenario < scenarios.length - 1) {
    loadScenario(currentScenario + 1);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  } else {
    showResults();
  }
}

function showResults() {
  document.getElementById('simContent').style.display = 'none';
  const r = document.getElementById('resultsScreen');
  r.classList.add('visible');

  const pct = Math.round((score / scenarios.length) * 100);
  const circumference = 2 * Math.PI * 62;
  const offset = circumference - (pct / 100) * circumference;

  let grade, message;
  if (pct === 100) { grade = "🏆 Perfect Score!"; message = "You handled every situation like a seasoned pro. You're ready for the road — customers are going to love you."; }
  else if (pct >= 66) { grade = "👍 Great Job!"; message = "You've got strong instincts. Review the scenarios you missed — small improvements can make a big difference on the road."; }
  else { grade = "📚 Keep Practising"; message = "Delivery is tough, and learning the right responses takes practice. Review the coaching tips and try again — you'll get there!"; }

  document.getElementById('progressText').textContent = 'Training Complete';

  r.innerHTML = `
    <div class="score-ring">
      <svg width="160" height="160" viewBox="0 0 160 160">
        <circle cx="80" cy="80" r="62" fill="none" stroke="var(--card-border)" stroke-width="10"/>
        <circle cx="80" cy="80" r="62" fill="none" stroke="var(--blinkit-yellow)" stroke-width="10"
          stroke-dasharray="${circumference}"
          stroke-dashoffset="${offset}"
          stroke-linecap="round"
          style="transition: stroke-dashoffset 1.5s cubic-bezier(0.16, 1, 0.3, 1) 0.3s"/>
      </svg>
      <div class="score-text">
        <div class="score-num">${pct}%</div>
        <div class="score-label">Score</div>
      </div>
    </div>
    <h2 class="results-title">${grade}</h2>
    <p class="results-subtitle">${message}</p>
    <div class="results-breakdown">
      <div class="result-item correct-item">
        <div class="ri-num">${score}</div>
        <div class="ri-label">Correct</div>
      </div>
      <div class="result-item wrong-item">
        <div class="ri-num">${scenarios.length - score}</div>
        <div class="ri-label">To Review</div>
      </div>
      <div class="result-item">
        <div class="ri-num" style="color:var(--blinkit-yellow)">${scenarios.length}</div>
        <div class="ri-label">Scenarios</div>
      </div>
    </div>
    <button class="start-btn" onclick="restartSim()">Restart Training →</button>
  `;
}

function restartSim() {
  score = 0;
  answers = [];
  currentScenario = 0;
  document.getElementById('resultsScreen').classList.remove('visible');
  document.getElementById('resultsScreen').innerHTML = '';
  document.getElementById('simContent').style.display = 'block';
  loadScenario(0);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

      <rect x="100" y="96" width="90" height="18" rx="9" fill="rgba(231,76,60,0.2)"/>
      <text x="145" y="108" fill="#E74C3C" font-size="8" text-anchor="middle" font-family="DM Sans" font-weight="600">🚦 Heavy Traffic</text>
    </svg>`;
  }
  if (type === 'society') {
    return `<svg viewBox="0 0 300 160" xmlns="http://www.w3.org/2000/svg">
      <rect width="300" height="160" fill="#0D1117" rx="14"/>

        const col = i % 5;

        const y = 38 + row * 54;

        return `<rect x="${x}" y="${y}" width="30" height="36" rx="3" fill="${isTarget ? 'rgba(245,199,0,0.2)' : '#1A2332'}" stroke="${isTarget ? '#F5C700' : '#2A3A2C'}" stroke-width="1"/>
        <text x="${x+15}" y="${y+22}" fill="${isTarget ? '#F5C700' : '#556'}" font-size="8" text-anchor="middle" font-family="DM Sans" font-weight="${isTarget ? '700' : '400'}">T${n}</text>`;
      }).join('')}
      <!-- you marker wandering -->
      <circle cx="90" cy="105" r="6" fill="#F5C700">
        <animate attributeName="cx" values="90;140;120;160;90" dur="5s" repeatCount="indefinite"/>
      </circle>
      <text x="90" y="130" fill="#F5C700" font-size="8" font-family="DM Sans" font-weight="700">
        <animate attributeName="x" values="80;130;110;150;80" dur="5s" repeatCount="indefinite"/>
        ?
      </text>
      <!-- GPS confused icon -->
      <rect x="210" y="125" width="70" height="18" rx="9" fill="rgba(243,156,18,0.2)"/>
      <text x="245" y="137" fill="#F39C12" font-size="7" text-anchor="middle" font-family="DM Sans" font-weight="600">📍 GPS Weak</text>
    </svg>`;
  }
  if (type === 'delivery') {
    return `<svg viewBox="0 0 300 160" xmlns="http://www.w3.org/2000/svg">
      <rect width="300" height="160" fill="#0D1117" rx="14"/>

      <text x="143" y="88" fill="#E74C3C" font-size="6" font-family="DM Sans" font-weight="700">302</text>
