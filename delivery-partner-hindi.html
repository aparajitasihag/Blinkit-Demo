<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ब्लिंकिट डिलीवरी ट्रेनिंग सिमुलेशन</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;500;600;700;800&family=DM+Sans:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --blinkit-yellow: #F5C700;
  --blinkit-dark: #0C1A0E;
  --blinkit-green: #2B8C0E;
  --blinkit-green-light: #3AAF15;
  --bg-main: #0A0F0B;
  --card-bg: #141E16;
  --card-border: #1E2E20;
  --text-primary: #E8F0E9;
  --text-secondary: #8CA68F;
  --text-muted: #566958;
  --correct: #2ECC71;
  --correct-bg: rgba(46, 204, 113, 0.08);
  --wrong: #E74C3C;
  --wrong-bg: rgba(231, 76, 60, 0.08);
  --warning: #F39C12;
  --phone-bg: #1A1A2E;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Noto Sans Devanagari', 'DM Sans', sans-serif;
  background: var(--bg-main);
  color: var(--text-primary);
  min-height: 100vh;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 9999;
}

.app-container { max-width: 1200px; margin: 0 auto; padding: 20px; }

.header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 20px 0 30px; border-bottom: 1px solid var(--card-border); margin-bottom: 30px;
}
.logo-area { display: flex; align-items: center; gap: 14px; }
.logo-icon {
  width: 48px; height: 48px; background: var(--blinkit-yellow); border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; font-weight: 800; color: var(--blinkit-dark);
  font-family: 'DM Sans', sans-serif;
  box-shadow: 0 4px 20px rgba(245, 199, 0, 0.3);
}
.logo-text h1 { font-size: 20px; font-weight: 800; color: var(--blinkit-yellow); font-family: 'DM Sans', sans-serif; }
.logo-text span { font-size: 12px; color: var(--text-muted); font-weight: 500; letter-spacing: 1px; }

.progress-badge {
  display: flex; align-items: center; gap: 10px;
  background: var(--card-bg); border: 1px solid var(--card-border);
  border-radius: 100px; padding: 8px 18px;
  font-size: 13px; color: var(--text-secondary);
}
.progress-badge .dot {
  width: 8px; height: 8px; border-radius: 50%; background: var(--blinkit-green);
  animation: pulse 2s ease infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(43, 140, 14, 0.5); }
  50% { opacity: 0.7; box-shadow: 0 0 0 6px rgba(43, 140, 14, 0); }
}

.scenario-layout { display: grid; grid-template-columns: 340px 1fr; gap: 30px; min-height: 600px; }

.phone-wrapper { display: flex; justify-content: center; align-items: flex-start; position: sticky; top: 30px; }
.phone {
  width: 300px; height: 580px; background: #0F0F1A; border-radius: 36px;
  border: 3px solid #2A2A3E; overflow: hidden; position: relative;
  box-shadow: 0 20px 80px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.05);
}
.phone-notch { width: 120px; height: 28px; background: #0F0F1A; border-radius: 0 0 16px 16px; margin: 0 auto; position: relative; z-index: 10; }
.phone-screen { padding: 0 14px 14px; height: calc(100% - 28px); overflow-y: auto; display: flex; flex-direction: column; }
.phone-screen::-webkit-scrollbar { width: 0; }
.phone-status { display: flex; justify-content: space-between; align-items: center; padding: 6px 4px 10px; font-size: 11px; color: #666; font-family: 'Space Mono', monospace; }

.map-visual { width: 100%; height: 160px; border-radius: 14px; margin-bottom: 12px; position: relative; overflow: hidden; flex-shrink: 0; }
.map-visual svg { width: 100%; height: 100%; }

.order-card { background: #1A1A2E; border: 1px solid #2A2A3E; border-radius: 14px; padding: 14px; margin-bottom: 10px; }
.order-card .label { font-size: 10px; text-transform: uppercase; letter-spacing: 1.5px; color: #555; margin-bottom: 6px; }
.order-card .value { font-size: 14px; color: #DDD; font-weight: 600; }
.order-card .value.highlight { color: var(--blinkit-yellow); }
.order-card .subtext { font-size: 11px; color: #666; margin-top: 3px; }

.delivery-timer {
  background: linear-gradient(135deg, rgba(231, 76, 60, 0.15), rgba(243, 156, 18, 0.1));
  border: 1px solid rgba(231, 76, 60, 0.3); border-radius: 14px;
  padding: 12px 14px; display: flex; align-items: center; gap: 10px; margin-bottom: 10px;
}
.delivery-timer .timer-icon { font-size: 20px; }
.delivery-timer .timer-text { font-size: 12px; color: #E74C3C; font-weight: 600; }
.delivery-timer .timer-text span { display: block; font-size: 10px; color: #888; font-weight: 400; margin-top: 2px; }

.notification-popup {
  background: linear-gradient(135deg, #1E1E36, #1A1A2E); border: 1px solid var(--blinkit-yellow);
  border-radius: 14px; padding: 12px 14px; margin-bottom: 10px;
  animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
}
.notification-popup .notif-header { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
.notification-popup .notif-icon { width: 24px; height: 24px; background: var(--blinkit-yellow); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 12px; }
.notification-popup .notif-app { font-size: 11px; color: var(--blinkit-yellow); font-weight: 700; font-family: 'DM Sans', sans-serif; }
.notification-popup .notif-body { font-size: 12px; color: #CCC; line-height: 1.5; }
@keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

.scenario-panel { display: flex; flex-direction: column; }
.scenario-tag {
  display: inline-flex; align-items: center; gap: 6px;
  background: rgba(245, 199, 0, 0.08); border: 1px solid rgba(245, 199, 0, 0.2);
  color: var(--blinkit-yellow); font-size: 11px; font-weight: 700;
  letter-spacing: 1px; padding: 6px 14px; border-radius: 100px;
  margin-bottom: 16px; width: fit-content;
}
.scenario-title { font-size: 26px; font-weight: 800; color: var(--text-primary); line-height: 1.3; margin-bottom: 10px; }
.scenario-narrative { font-size: 15px; color: var(--text-secondary); line-height: 1.8; margin-bottom: 28px; max-width: 560px; }
.scenario-narrative strong { color: var(--blinkit-yellow); font-weight: 600; }

.situation-box {
  background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 16px;
  padding: 20px; margin-bottom: 24px; position: relative; overflow: hidden;
}
.situation-box::before { content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%; background: var(--warning); border-radius: 4px 0 0 4px; }
.situation-label { font-size: 10px; text-transform: uppercase; letter-spacing: 2px; color: var(--warning); font-weight: 700; margin-bottom: 8px; }
.situation-text { font-size: 15px; color: var(--text-primary); line-height: 1.7; }

.options-label { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); font-weight: 700; margin-bottom: 14px; }
.options-grid { display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px; }
.option-btn {
  background: var(--card-bg); border: 1.5px solid var(--card-border); border-radius: 14px;
  padding: 16px 20px; cursor: pointer; transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
  display: flex; align-items: flex-start; gap: 14px; text-align: left;
  color: var(--text-primary); font-family: 'Noto Sans Devanagari', 'DM Sans', sans-serif;
  font-size: 14px; line-height: 1.6; position: relative; overflow: hidden;
}
.option-btn:hover:not(.disabled) { border-color: var(--blinkit-yellow); background: rgba(245, 199, 0, 0.04); transform: translateY(-2px); box-shadow: 0 8px 30px rgba(0,0,0,0.3); }
.option-btn .option-key {
  width: 32px; height: 32px; min-width: 32px; border-radius: 8px;
  background: rgba(255,255,255,0.05); display: flex; align-items: center; justify-content: center;
  font-family: 'Space Mono', monospace; font-size: 13px; font-weight: 700; color: var(--text-muted); transition: all 0.25s ease;
}
.option-btn:hover:not(.disabled) .option-key { background: var(--blinkit-yellow); color: var(--blinkit-dark); }
.option-btn.selected-correct { border-color: var(--correct); background: var(--correct-bg); }
.option-btn.selected-correct .option-key { background: var(--correct); color: #fff; }
.option-btn.selected-wrong { border-color: var(--wrong); background: var(--wrong-bg); animation: shakeX 0.5s ease; }
.option-btn.selected-wrong .option-key { background: var(--wrong); color: #fff; }
.option-btn.reveal-correct { border-color: var(--correct); background: var(--correct-bg); }
.option-btn.reveal-correct .option-key { background: var(--correct); color: #fff; }
.option-btn.disabled { opacity: 0.4; cursor: not-allowed; }
@keyframes shakeX { 0%, 100% { transform: translateX(0); } 20% { transform: translateX(-8px); } 40% { transform: translateX(8px); } 60% { transform: translateX(-4px); } 80% { transform: translateX(4px); } }

.feedback-panel { border-radius: 16px; padding: 20px; margin-bottom: 20px; animation: fadeIn 0.4s ease; display: none; }
.feedback-panel.visible { display: block; }
.feedback-panel.correct { background: var(--correct-bg); border: 1px solid rgba(46, 204, 113, 0.3); }
.feedback-panel.wrong { background: var(--wrong-bg); border: 1px solid rgba(231, 76, 60, 0.3); }
.feedback-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.feedback-icon { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
.feedback-panel.correct .feedback-icon { background: rgba(46, 204, 113, 0.2); }
.feedback-panel.wrong .feedback-icon { background: rgba(231, 76, 60, 0.2); }
.feedback-title { font-size: 16px; font-weight: 700; }
.feedback-panel.correct .feedback-title { color: var(--correct); }
.feedback-panel.wrong .feedback-title { color: var(--wrong); }
.feedback-body { font-size: 14px; color: var(--text-secondary); line-height: 1.8; }
.feedback-body strong { color: var(--text-primary); font-weight: 600; }

.coaching-tip {
  background: rgba(245, 199, 0, 0.06); border: 1px solid rgba(245, 199, 0, 0.15);
  border-radius: 12px; padding: 14px 16px; margin-top: 12px; display: flex; gap: 10px;
}
.coaching-tip .tip-icon { font-size: 18px; flex-shrink: 0; }
.coaching-tip .tip-text { font-size: 13px; color: var(--blinkit-yellow); line-height: 1.7; }

.next-btn {
  background: var(--blinkit-yellow); color: var(--blinkit-dark); border: none; border-radius: 12px;
  padding: 14px 32px; font-family: 'Noto Sans Devanagari', 'DM Sans', sans-serif;
  font-size: 15px; font-weight: 700; cursor: pointer; transition: all 0.25s ease;
  display: none; align-items: center; gap: 8px; width: fit-content;
}
.next-btn.visible { display: inline-flex; }
.next-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(245, 199, 0, 0.3); }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

.welcome-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 60px 20px; min-height: 500px; }
.welcome-badge { background: var(--blinkit-yellow); color: var(--blinkit-dark); width: 80px; height: 80px; border-radius: 22px; display: flex; align-items: center; justify-content: center; font-size: 36px; font-weight: 900; margin-bottom: 24px; box-shadow: 0 12px 40px rgba(245, 199, 0, 0.3); }
.welcome-screen h2 { font-size: 34px; font-weight: 800; margin-bottom: 12px; }
.welcome-screen p { color: var(--text-secondary); font-size: 16px; max-width: 520px; line-height: 1.8; margin-bottom: 36px; }
.welcome-features { display: flex; gap: 20px; margin-bottom: 40px; flex-wrap: wrap; justify-content: center; }
.welcome-feature { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 14px; padding: 16px 20px; display: flex; align-items: center; gap: 12px; font-size: 14px; color: var(--text-secondary); }
.welcome-feature .wf-icon { font-size: 22px; }
.start-btn {
  background: var(--blinkit-yellow); color: var(--blinkit-dark); border: none; border-radius: 14px;
  padding: 16px 48px; font-family: 'Noto Sans Devanagari', 'DM Sans', sans-serif;
  font-size: 17px; font-weight: 800; cursor: pointer; transition: all 0.3s ease;
}
.start-btn:hover { transform: translateY(-3px); box-shadow: 0 12px 40px rgba(245, 199, 0, 0.35); }

.results-screen { display: none; flex-direction: column; align-items: center; text-align: center; padding: 50px 20px; }
.results-screen.visible { display: flex; }
.score-ring { width: 160px; height: 160px; position: relative; margin-bottom: 24px; }
.score-ring svg { transform: rotate(-90deg); }
.score-ring .score-text { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.score-ring .score-num { font-size: 42px; font-weight: 800; color: var(--blinkit-yellow); font-family: 'DM Sans', sans-serif; }
.score-ring .score-label { font-size: 12px; color: var(--text-muted); letter-spacing: 1px; }
.results-title { font-size: 28px; font-weight: 800; margin-bottom: 10px; }
.results-subtitle { color: var(--text-secondary); font-size: 15px; max-width: 440px; line-height: 1.8; margin-bottom: 30px; }
.results-breakdown { display: flex; gap: 16px; margin-bottom: 36px; flex-wrap: wrap; justify-content: center; }
.result-item { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 14px; padding: 16px 24px; min-width: 140px; }
.result-item .ri-num { font-size: 28px; font-weight: 800; margin-bottom: 4px; font-family: 'DM Sans', sans-serif; }
.result-item .ri-label { font-size: 12px; color: var(--text-muted); letter-spacing: 1px; }
.result-item.correct-item .ri-num { color: var(--correct); }
.result-item.wrong-item .ri-num { color: var(--wrong); }

@media (max-width: 768px) {
  .scenario-layout { grid-template-columns: 1fr; }
  .phone-wrapper { position: relative; top: 0; margin-bottom: 10px; }
  .phone { width: 260px; height: 480px; }
  .scenario-title { font-size: 22px; }
  .header { flex-direction: column; gap: 14px; align-items: flex-start; }
}
</style>
</head>
<body>
<div class="app-container" id="app">
  <div class="header">
    <div class="logo-area">
      <div class="logo-icon">B</div>
      <div class="logo-text">
        <h1>blinkit</h1>
        <span>डिलीवरी ट्रेनिंग</span>
      </div>
    </div>
    <div class="progress-badge" id="progressBadge">
      <div class="dot"></div>
      <span id="progressText">शुरू करने के लिए तैयार</span>
    </div>
  </div>

  <div id="welcomeScreen" class="welcome-screen">
    <div class="welcome-badge">⚡</div>
    <h2>डिलीवरी प्रो ट्रेनिंग</h2>
    <p>असली परिस्थितियाँ। सही फ़ैसले। वो सभी ज़रूरी कौशल सीखें जो एक टॉप-रेटेड Blinkit डिलीवरी पार्टनर को चाहिए — ट्रैफ़िक जाम से लेकर मुश्किल कस्टमर तक।</p>
    <div class="welcome-features">
      <div class="welcome-feature"><span class="wf-icon">🚦</span> ट्रैफ़िक में देरी</div>
      <div class="welcome-feature"><span class="wf-icon">🗺️</span> रास्ता भटकना</div>
      <div class="welcome-feature"><span class="wf-icon">😤</span> नाराज़ कस्टमर</div>
    </div>
    <button class="start-btn" onclick="startSimulation()">ट्रेनिंग शुरू करें →</button>
  </div>

  <div id="simContent" style="display:none;"></div>
  <div id="resultsScreen" class="results-screen"></div>
</div>

<script>
const scenarios = [
  {
    id: 1,
    tag: "परिदृश्य 1 · ट्रैफ़िक में देरी",
    tagIcon: "🚦",
    title: "रश-ऑवर ट्रैफ़िक में फँसे",
    narrative: `शाम के 7:15 बज रहे हैं। आपने <strong>Blinkit डार्क स्टोर #47</strong> से एक ग्रॉसरी ऑर्डर पिक-अप किया है — दूध, ब्रेड और अंडे। डिलीवरी का वादा <strong>10 मिनट</strong> में था, लेकिन आप MG रोड सिग्नल पर 6 मिनट से फँसे हैं। ऐप में ऑर्डर <strong>"देर हो रही है"</strong> दिखा रहा है।`,
    situation: "आपके फ़ोन पर कस्टमर का मैसेज आता है: \"मेरा ऑर्डर कहाँ है? 15 मिनट हो गए!\" आप अभी भी 2 किमी दूर हैं और ट्रैफ़िक हिल नहीं रहा। आप क्या करेंगे?",
    mapType: "traffic",
    phoneNotification: { text: "कस्टमर मैसेज: \"मेरा ऑर्डर कहाँ है? 15 मिनट हो गए!\"" },
    orderInfo: { id: "#BLK-90421", items: "दूध, ब्रेड, अंडे (3 आइटम)", address: "B-204, सनशाइन अपार्टमेंट्स", eta: "देर हो रही है", etaClass: "highlight" },
    timerText: "ETA से 6 मि. देर",
    timerSub: "कस्टमर इंतज़ार कर रहा है",
    options: [
      { key: "A", text: "मैसेज को अनदेखा करो। ड्राइविंग पर ध्यान दो और जब पहुँचो तब पहुँचो — रिप्लाई करने में वक़्त बर्बाद होगा।", correct: false,
        feedback: "कस्टमर को अनदेखा करने से वो और ज़्यादा परेशान होता है। इससे ऑर्डर कैंसिल या 1-स्टार रेटिंग मिल सकती है।",
        coaching: "10 सेकंड का रिप्लाई भी भरोसा बनाता है। डिलीवरी पार्टनर की चुप्पी कस्टमर की चिंता बढ़ाने का सबसे बड़ा कारण है।"
      },
      { key: "B", text: "एक शॉर्ट पोलाइट मैसेज भेजो: \"नमस्ते! MG रोड पर भारी ट्रैफ़िक में फँसा हूँ। लगभग 8 मिनट में पहुँचूँगा। देरी के लिए माफ़ी 🙏\"", correct: true,
        feedback: "प्रोएक्टिव कम्युनिकेशन सबसे बेहतरीन तरीका है। आपने देरी स्वीकार की, सही ETA दिया, और सहानुभूति दिखाई — सब 15 सेकंड में।",
        coaching: "Blinkit प्रो टिप: जिन कस्टमर को देरी का मैसेज मिलता है, वो 3 गुना कम कैंसिल करते हैं और लेट ऑर्डर पर भी औसतन 4.2★ रेटिंग देते हैं।"
      },
      { key: "C", text: "कस्टमर को कॉल करो और ट्रैफ़िक की पूरी डिटेल बताओ कि यह तुम्हारी ग़लती नहीं है।", correct: false,
        feedback: "गाड़ी चलाते हुए कॉल करना ख़तरनाक और ग़ैरकानूनी है। लंबी सफ़ाई बहानेबाज़ी लगती है। कस्टमर को कारण नहीं, भरोसा चाहिए।",
        coaching: "सुरक्षित रहो: ड्राइविंग करते वक़्त कभी कॉल मत करो। एक छोटा टेक्स्ट मैसेज तेज़, सुरक्षित और कस्टमर के लिए कम परेशानी वाला है।"

let currentScenario = 0, score = 0, answers = [];

function startSimulation() {
  document.getElementById('welcomeScreen').style.display = 'none';
  document.getElementById('simContent').style.display = 'block';
  loadScenario(0);
}

function loadScenario(index) {
  currentScenario = index;
  const s = scenarios[index];
  document.getElementById('progressText').textContent = `परिदृश्य ${index + 1} / ${scenarios.length}`;
  const html = `
    <div class="scenario-layout" style="animation: fadeIn 0.5s ease">
      <div class="phone-wrapper">
        <div class="phone">
          <div class="phone-notch"></div>
          <div class="phone-screen">
            <div class="phone-status"><span>7:15 PM</span><span>📶 4G</span></div>
            <div class="map-visual">${getMapSVG(s.mapType)}</div>
            <div class="order-card"><div class="label">ऑर्डर</div><div class="value">${s.orderInfo.id}</div><div class="subtext">${s.orderInfo.items}</div></div>
            <div class="order-card"><div class="label">डिलीवरी पता</div><div class="value">${s.orderInfo.address}</div><div class="subtext">ETA: <span class="${s.orderInfo.etaClass}">${s.orderInfo.eta}</span></div></div>
            <div class="delivery-timer"><div class="timer-icon">⏱️</div><div class="timer-text">${s.timerText}<span>${s.timerSub}</span></div></div>
            <div class="notification-popup"><div class="notif-header"><div class="notif-icon">⚡</div><div class="notif-app">BLINKIT</div></div><div class="notif-body">${s.phoneNotification.text}</div></div>
          </div>
        </div>
      </div>
      <div class="scenario-panel">
        <div class="scenario-tag">${s.tagIcon} ${s.tag}</div>
        <h2 class="scenario-title">${s.title}</h2>
        <p class="scenario-narrative">${s.narrative}</p>
        <div class="situation-box"><div class="situation-label">⚠ स्थिति</div><div class="situation-text">${s.situation}</div></div>
        <div class="options-label">आप क्या करेंगे?</div>
        <div class="options-grid" id="optionsGrid">
          ${s.options.map((o, i) => `<button class="option-btn" data-index="${i}" onclick="selectOption(${i})"><div class="option-key">${o.key}</div><div>${o.text}</div></button>`).join('')}
        </div>
        <div class="feedback-panel" id="feedbackPanel"></div>
        <button class="next-btn" id="nextBtn" onclick="nextScenario()">${index < scenarios.length - 1 ? 'अगला परिदृश्य →' : 'नतीजे देखें →'}</button>
      </div>
    </div>`;
  document.getElementById('simContent').innerHTML = html;
}

function selectOption(index) {
  const s = scenarios[currentScenario];
  const option = s.options[index];
  const buttons = document.querySelectorAll('.option-btn');
  const feedback = document.getElementById('feedbackPanel');
  const nextBtn = document.getElementById('nextBtn');
  buttons.forEach((btn, i) => {
    btn.classList.add('disabled'); btn.onclick = null;
    if (i === index) btn.classList.add(option.correct ? 'selected-correct' : 'selected-wrong');
    if (!option.correct && s.options[i].correct) setTimeout(() => btn.classList.add('reveal-correct'), 600);
  });
  if (option.correct) score++;
  answers.push({ scenario: currentScenario, correct: option.correct, selected: index });
  const correctOption = s.options.find(o => o.correct);
  feedback.className = `feedback-panel visible ${option.correct ? 'correct' : 'wrong'}`;
  feedback.innerHTML = `
    <div class="feedback-header"><div class="feedback-icon">${option.correct ? '✅' : '❌'}</div><div class="feedback-title">${option.correct ? 'बहुत बढ़िया!' : 'यह सबसे अच्छा तरीका नहीं है'}</div></div>
    <div class="feedback-body">
      ${option.feedback}
      ${!option.correct ? `<br><br><strong>बेहतर तरीका (विकल्प ${correctOption.key}):</strong> ${correctOption.feedback}` : ''}
      <div class="coaching-tip"><div class="tip-icon">💡</div><div class="tip-text">${option.correct ? option.coaching : correctOption.coaching}</div></div>
    </div>`;
  nextBtn.classList.add('visible');
  setTimeout(() => feedback.scrollIntoView({ behavior: 'smooth', block: 'center' }), 300);
}

function nextScenario() {
  if (currentScenario < scenarios.length - 1) { loadScenario(currentScenario + 1); window.scrollTo({ top: 0, behavior: 'smooth' }); }
  else showResults();
}

function showResults() {
  document.getElementById('simContent').style.display = 'none';
  const r = document.getElementById('resultsScreen');
  r.classList.add('visible');
  const pct = Math.round((score / scenarios.length) * 100);
  const circumference = 2 * Math.PI * 62;
  const offset = circumference - (pct / 100) * circumference;
  let grade, message;
  if (pct === 100) { grade = "🏆 परफ़ेक्ट स्कोर!"; message = "आपने हर स्थिति को एक अनुभवी प्रो की तरह सँभाला। आप सड़क के लिए तैयार हैं — कस्टमर आपको पसंद करेंगे।"; }
  else if (pct >= 66) { grade = "👍 बहुत अच्छा!"; message = "आपकी सोच मज़बूत है। जो परिदृश्य छूट गए उन्हें रिव्यू करें — छोटे सुधार बड़ा फ़र्क़ ला सकते हैं।"; }
  else { grade = "📚 और अभ्यास करें"; message = "डिलीवरी मुश्किल काम है और सही तरीका सीखने में वक़्त लगता है। कोचिंग टिप्स रिव्यू करें और फिर कोशिश करें!"; }
  document.getElementById('progressText').textContent = 'ट्रेनिंग पूरी हुई';
  r.innerHTML = `
    <div class="score-ring">
      <svg width="160" height="160" viewBox="0 0 160 160">
        <circle cx="80" cy="80" r="62" fill="none" stroke="var(--card-border)" stroke-width="10"/>
        <circle cx="80" cy="80" r="62" fill="none" stroke="var(--blinkit-yellow)" stroke-width="10" stroke-dasharray="${circumference}" stroke-dashoffset="${offset}" stroke-linecap="round" style="transition: stroke-dashoffset 1.5s cubic-bezier(0.16, 1, 0.3, 1) 0.3s"/>
      </svg>
      <div class="score-text"><div class="score-num">${pct}%</div><div class="score-label">स्कोर</div></div>
    </div>
    <h2 class="results-title">${grade}</h2>
    <p class="results-subtitle">${message}</p>
    <div class="results-breakdown">
      <div class="result-item correct-item"><div class="ri-num">${score}</div><div class="ri-label">सही</div></div>
      <div class="result-item wrong-item"><div class="ri-num">${scenarios.length - score}</div><div class="ri-label">रिव्यू करें</div></div>
      <div class="result-item"><div class="ri-num" style="color:var(--blinkit-yellow)">${scenarios.length}</div><div class="ri-label">परिदृश्य</div></div>
    </div>
    <button class="start-btn" onclick="restartSim()">फिर से शुरू करें →</button>`;
}

function restartSim() {
  score = 0; answers = []; currentScenario = 0;
  document.getElementById('resultsScreen').classList.remove('visible');
  document.getElementById('resultsScreen').innerHTML = '';
  document.getElementById('simContent').style.display = 'block';
  loadScenario(0); window.scrollTo({ top: 0, behavior: 'smooth' });
}
